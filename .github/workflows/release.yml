name: Release Nexo Desktop

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: nexo-desktop/package-lock.json

      - name: Install dependencies
        working-directory: nexo-desktop
        run: npm ci

      - name: Build Windows NSIS
        working-directory: nexo-desktop
        run: npm run dist:win

      - name: Publish GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nexo ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            nexo-desktop/dist/*.exe
            nexo-desktop/dist/latest.yml
            nexo-desktop/dist/*.blockmap
